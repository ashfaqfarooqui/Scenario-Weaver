# ─── Scenario: Cut-in from Left (Cartesian, 3-Lane) ───
#
# An NPC cuts in from the left lane on a 3-lane all-forward road using explicit cartesian coordinates.
#
# Actors:
#   - ego: lane 1 (center), 14-16 m/s forward, position 40-60m
#   - npc: lane 0 (left), 16-20 m/s forward, position 50-80m
#
# Road: 3 lanes, 3.5m wide, all forward
# Coordinate System: cartesian
# Duration: 10.0s at 0.1s time steps
#
# Key Features:
#   - NPC performs right lane change at 2.5-5.0s over 3-4s duration
#   - 3-lane road with all forward directions
#   - Explicitly sets coordinate_system: cartesian
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/cut_in_left_cartesian.yaml -o output/
#
scenario_type: cut_in_left
coordinate_system: cartesian

time_step: 0.1
duration: 10.0

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: [40.0, 60.0]
    speed: [14.0, 16.0]
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0                    # left of ego
    position: [50.0, 80.0]
    speed: [16.0, 20.0]
    direction: 1
    acceleration: [-8.0, 3.0]

    lane_changes:
      - direction: right        # NPC cuts from lane 0 into lane 1 (ego's lane)
        start_time: [2.5, 5.0]
        duration: [3.0, 4.0]

min_ttc: 3.0
min_distance: 5.0

num_scenarios: 5
