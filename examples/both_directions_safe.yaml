# ─── Scenario: Both Directions Safe ───
#
# Bidirectional road with an NPC performing a left lane change while all safety constraints are enforced.
#
# Actors:
#   - ego: lane 0, 15 m/s forward, fixed position at 50m
#   - npc1: lane 1, 18 m/s forward, left lane change at 2.5-4.0s over 3-4s
#
# Road: 4 lanes, 3.5m wide, bidirectional [1, 1, -1, -1]
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Bidirectional road with 2 forward and 2 backward lanes
#   - NPC performs left lane change into ego's lane
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/both_directions_safe.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]

# Actors - multiple vehicles in both directions
actors:
  - id: ego
    role: ego
    lane: 0
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc1
    role: npc
    lane: 1
    position: 30.0
    speed: 18.0
    direction: 1
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: left
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

  

# Safety constraints - all vehicles maintain safe distances
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: enforce
  min_distance: enforce
