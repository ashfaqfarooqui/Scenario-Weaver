scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]

# Actors - multiple vehicles in both directions
actors:
  - id: ego
    role: ego
    lane: 0
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc1
    role: npc
    lane: 1
    position: 30.0
    speed: 18.0
    direction: 1
    acceleration: [-8.0, 3.0]
    behavior:
      cut_in_time: [2.5, 7.5]

  

# Safety constraints - all vehicles maintain safe distances
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: enforce
  min_distance: enforce
