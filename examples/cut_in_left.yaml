# ─── Scenario: Cut-in from Left ───
#
# An NPC in the left lane performs a right lane change into the ego's lane on a 3-lane road.
#
# Actors:
#   - ego: lane 1, 14-16 m/s forward, position 0-55m
#   - npc: lane 0 (left), 16-20 m/s forward, position 20-80m
#
# Road: 3 lanes, 3.5m wide, directions [forward, forward, backward]
# Coordinate System: cartesian
# Duration: 10.0s at 0.1s time steps
#
# Key Features:
#   - NPC performs right lane change at 1.4-3.5s over 3-4s duration
#   - Generates 5 diverse scenarios via blocking clauses
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/cut_in_left.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.1
duration: 10.0

# Road specification
road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, -1]

# Coordinate system (default: cartesian)
coordinate_system: cartesian

# Actor specifications
actors:
  # Ego vehicle (controlled by AV under test)
  - id: ego
    role: ego
    lane: 1  # right lane
    position: [0.0, 55.0]
    speed: [14.0, 16.0]
    direction: 1
    acceleration: [-8.0, 3.0]

  # NPC vehicle (background actor)
  - id: npc
    role: npc
    lane: 0  # left lane
    position: [20.0, 80.0]
    speed: [16.0, 20.0]
    direction: 1
    acceleration: [-8.0, 3.0]

    # Lane changes configuration (replaces behavior.cut_in_time)
    lane_changes:
      - direction: right         # NPC cuts from left (lane 0) to right (lane 1)
        start_time: [1.4, 3.5]  # Lane change starts between 1.4-3.5 seconds
        duration: [3.0, 4.0]    # Lane change takes 3-4 seconds (smooth transition)

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
# Generation settings
num_scenarios: 5
