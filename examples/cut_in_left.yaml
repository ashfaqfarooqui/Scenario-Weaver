scenario_type: cut_in_left

# Time configuration
time_step: 0.1
duration: 10.0

# Road specification
road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, -1]

# Coordinate system (default: cartesian)
coordinate_system: cartesian

# Actor specifications
actors:
  # Ego vehicle (controlled by AV under test)
  - id: ego
    role: ego
    lane: 1  # right lane
    position: [0.0, 55.0]
    speed: [14.0, 16.0]
    direction: 1
    acceleration: [-8.0, 3.0]

  # NPC vehicle (background actor)
  - id: npc
    role: npc
    lane: 0  # left lane
    position: [20.0, 80.0]
    speed: [16.0, 20.0]
    direction: 1
    acceleration: [-8.0, 3.0]

    # Lane changes configuration (replaces behavior.cut_in_time)
    lane_changes:
      - direction: right         # NPC cuts from left (lane 0) to right (lane 1)
        start_time: [1.4, 3.5]  # Lane change starts between 1.4-3.5 seconds
        duration: [3.0, 4.0]    # Lane change takes 3-4 seconds (smooth transition)

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
# Generation settings
num_scenarios: 5
