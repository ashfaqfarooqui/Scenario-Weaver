scenario_type: cut_in_left

# Time configuration
time_step: 0.1 # 0.5 second discretization
duration: 10.0 # 10 second scenario
# Road specification
road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [ 1,1,-1]

# Actor specifications (generic actor system)
actors:
  # Ego vehicle (controlled by AV under test)
  # Both fixed values and ranges are supported
  - id: ego
    role: ego
    lane: 1 # right lane
    position: [0.0, 55.0] # 45-55 meters from start (Z3 chooses)
    speed: [14.0, 16.0] # 14-16 m/s (Z3 chooses)
    direction: 1
    acceleration: [0.0, 3.0] # -8.0 to 3.0 m/s² (emergency braking to moderate acceleration)

  # NPC vehicle (background actor)
  - id: npc
    role: npc
    lane: 0 # left lane
    position: [20.0, 80.0] # start 60-80m from start (Z3 chooses)
    speed: [16.0, 20.0] # slightly slower (Z3 chooses)
    direction: 1
    acceleration: [0.0, 3.0] # -8.0 to 3.0 m/s²
    behavior:
      cut_in_time: [1.4, 3.5] # cut in between 2.5-7.5 seconds

# Safety constraints
min_ttc: 3.0 # minimum 3 second time-to-collision
min_distance: 5.0 # minimum 5 meter distance
lane_width: 3.5 # 3.5 meter lane width

# Generation settings
num_scenarios: 5 # generate 1 scenario (change to 5 for multiple)
