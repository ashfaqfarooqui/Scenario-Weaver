# ─── Scenario: Cut-in from Right ───
#
# An NPC in the right lane performs a left lane change into the ego's lane.
#
# Actors:
#   - ego: lane 0 (left), 14-16 m/s forward, position 45-55m
#   - npc: lane 1 (right), 12-14 m/s forward, position 60-80m
#
# Road: 2 lanes, 3.5m wide, both forward
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.1s time steps
#
# Key Features:
#   - NPC performs left lane change at 2.5-7.5s over 3-4s duration
#   - Mirror of cut_in_left scenario with reversed lane positions
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/cut_in_right.yaml -o output/
#
scenario_type: cut_in_right

# Time configuration
time_step: 0.1        # 0.5 second discretization
duration: 10.0        # 10 second scenario

# Road specification
road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]  # Both lanes forward

# Actor specifications (generic actor system)
actors:
  # Ego vehicle (controlled by AV under test) in LEFT lane
  - id: ego
    role: ego
    lane: 0                  # left lane
    position: [45.0, 55.0]   # 45-55 meters from start (Z3 chooses)
    speed: [14.0, 16.0]      # 14-16 m/s (Z3 chooses)
    direction: 1
    acceleration: [-8.0, 3.0]  # -8.0 to 3.0 m/s² (emergency braking to moderate acceleration)

  # NPC vehicle (background actor) in RIGHT lane
  - id: npc
    role: npc
    lane: 1                  # right lane
    position: [60.0, 80.0]   # start 60-80m from start (Z3 chooses)
    speed: [12.0, 14.0]      # slightly slower (Z3 chooses)
    direction: 1
    acceleration: [-8.0, 3.0]  # -8.0 to 3.0 m/s²

    # Lane changes configuration (replaces behavior.cut_in_time)
    lane_changes:
      - direction: left          # NPC cuts from right (lane 1) to left (lane 0)
        start_time: [2.5, 7.5]  # Lane change starts between 2.5-7.5 seconds
        duration: [3.0, 4.0]    # Lane change takes 3-4 seconds (smooth transition)

# Safety constraints
min_ttc: 3.0              # minimum 3 second time-to-collision
min_distance: 5.0         # minimum 5 meter distance
# Generation settings
num_scenarios: 5          # generate 5 scenarios
