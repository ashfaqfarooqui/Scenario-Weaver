# ─── Scenario: Speed Limit Violation ───
#
# Adversarial scenario where the ego vehicle exceeds a 22 m/s speed limit during a cut-in.
#
# Actors:
#   - ego: lane 1, 25-30 m/s forward (intentionally above speed limit)
#   - npc: lane 0, 15-20 m/s forward, right lane change at 3.0-5.0s over 3-4s
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: cartesian
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Speed limit of 22 m/s (~50 mph) set via max_velocity
#   - max_velocity constraint in violate mode (adversarial - finds speeding scenario)
#   - TTC and distance constraints remain enforced for safety
#   - Demonstrates VelocityGT/LT propositions
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#   - max velocity: 22.0 m/s (violated - adversarial)
#
# Run:
#   cargo run --release -- -i examples/speed_limit_violation.yaml -o output/
#
scenario_type: cut_in_left
time_step: 0.5
duration: 10.0
num_scenarios: 1

actors:
  - id: ego
    role: ego
    lane: 1
    position: [0.0, 20.0]
    speed: [25.0, 30.0]  # Speeding - above the 22 m/s limit
    direction: 1
    acceleration: [-5.0, 3.0]

  - id: npc
    role: npc
    lane: 0
    position: [40.0, 60.0]
    speed: [15.0, 20.0]  # Within limit
    direction: 1
    acceleration: [-4.0, 2.0]
    lane_changes:
      - direction: right
        start_time: [3.0, 5.0]
        duration: [3.0, 4.0]

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

min_ttc: 3.0
min_distance: 5.0

# Speed limit: 22 m/s (approximately 50 mph)
max_velocity: 22.0

# Constraint modes: violate max_velocity (adversarial - find speeding scenario)
# while maintaining safety (enforce TTC and distance)
constraint_modes:
  min_ttc: enforce         # Must maintain safe TTC
  min_distance: enforce    # Must maintain safe distance
  max_velocity: violate    # MUST violate speed limit (adversarial)
