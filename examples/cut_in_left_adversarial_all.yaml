# ─── Scenario: Cut-in from Left (Adversarial - Violate All) ───
#
# An NPC cuts in from the left lane while intentionally violating all safety constraints.
#
# Actors:
#   - ego: lane 1, fixed 15 m/s forward, position 50m
#   - npc: lane 0 (left), 12-14 m/s forward, position 60-80m
#
# Road: 2 lanes, 3.5m wide, both forward
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - NPC performs right lane change at 2.5-4.0s over 3-4s duration
#   - Uses violate_all constraint mode to find worst-case scenarios
#   - Coarser time step (0.5s) for faster adversarial solving
#
# Safety Constraints:
#   - min TTC: 3.0s (violated)
#   - min distance: 5.0m (violated)
#
# Run:
#   cargo run --release -- -i examples/cut_in_left_adversarial_all.yaml -o output/
#
scenario_type: cut_in_left

time_step: 0.5
duration: 10.0

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    direction: 1
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

min_ttc: 3.0
min_distance: 5.0

# Violate all safety constraints
constraint_modes: violate_all

num_scenarios: 5
