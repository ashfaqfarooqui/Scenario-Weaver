# ─── Scenario: Head-On Near Miss ───
#
# Oncoming NPC changes lanes on a bidirectional road while safety constraints are enforced, producing a near-miss.
#
# Actors:
#   - ego: lane 0, 20 m/s forward, starting at 50m
#   - npc: lane 2 (oncoming), 18 m/s backward, starting at 150m, left lane change at 2.5-4.0s
#
# Road: 4 lanes, 3.5m wide, bidirectional [1, 1, -1, -1]
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Oncoming NPC performs left lane change (toward lane 3, away from ego)
#   - High closing speed but safety maintained via enforced constraints
#   - NPC merges to adjacent backward lane to avoid collision
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/head_on_near_miss.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]

# Actors
actors:
  - id: ego
    role: ego
    lane: 0
    position: 50.0
    speed: 20.0
    direction: 1               # Forward (+x)
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 2
    position: 150.0
    speed: 18.0                 # Slightly slower, creates near miss
    direction: -1              # Backward (-x) - oncoming traffic!
    acceleration: [-2.0, 0.0]
    lane_changes:
      - direction: left
        start_time: [2.5, 4.0]
        duration: [2.0, 3.0]

# Safety constraints - ENFORCE to maintain safety
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: enforce
  min_distance: enforce

# Expected: NPC may merge to lane 3 to avoid collision
