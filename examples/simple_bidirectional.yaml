# ─── Scenario: Simple Bidirectional ───
#
# Basic cut-in on a bidirectional road where both actors travel forward and the NPC changes right into ego's lane.
#
# Actors:
#   - ego: lane 1, 15 m/s forward, fixed position at 50m
#   - npc: lane 0, 12-14 m/s forward, position 60-80m, right lane change at 2.5-4.0s over 3-4s
#
# Road: 4 lanes, 3.5m wide, bidirectional [1, 1, -1, -1]
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Both actors in forward lanes on a bidirectional road
#   - NPC cuts right from lane 0 into ego's lane 1
#   - NPC uses range-based position and speed for solver diversity
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/simple_bidirectional.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]

# Simple 2-actor scenario
actors:
  - id: ego
    role: ego
    lane: 1                    # Forward lane
    position: 50.0
    speed: 15.0                # 15 m/s forward
    direction: 1               # Forward (+x)
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0                    # Also forward lane (same direction as ego)
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    direction: 1               # Forward (+x)
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: enforce
  min_distance: enforce
