# Example scenario using road import from library
imports:
  - roads/4_lane_bidirectional.yaml

scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Actors
actors:
  - id: ego
    role: ego
    lane: 1                     # Forward lane
    position: 50.0
    speed: 15.0
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0                     # Also forward lane
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    acceleration: [-8.0, 3.0]
    behavior:
      cut_in_time: [2.5, 7.5]

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
