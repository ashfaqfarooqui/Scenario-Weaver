# ─── Scenario: Cut-In With Road Import ───
#
# Cut-in scenario on a 4-lane bidirectional road imported from the road library.
#
# Actors:
#   - ego: lane 1 (forward), 15 m/s, fixed position at 50m
#   - npc: lane 0 (forward), 12-14 m/s, right lane change at 2.5-4.0s over 3-4s
#
# Road: 4 lanes, 3.5m wide, lanes 0-1 forward, lanes 2-3 backward (imported)
# Coordinate System: cartesian
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Imports road definition from roads/4_lane_bidirectional.yaml
#   - Inline road spec serves as fallback if import fails
#   - Demonstrates road library import functionality
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/with_import.yaml -o output/
#
imports:
  - roads/4_lane_bidirectional.yaml

scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification (fallback if imports don't work)
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]  # 2 forward, 2 backward

# Actors
actors:
  - id: ego
    role: ego
    lane: 1                     # Forward lane
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0                     # Also forward lane
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    direction: 1
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
