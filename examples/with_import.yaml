# Example scenario using road import from library
imports:
  - roads/4_lane_bidirectional.yaml

scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification (fallback if imports don't work)
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]  # 2 forward, 2 backward

# Actors
actors:
  - id: ego
    role: ego
    lane: 1                     # Forward lane
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0                     # Also forward lane
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    direction: 1
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
