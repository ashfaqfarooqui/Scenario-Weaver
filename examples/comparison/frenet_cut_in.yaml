# Comparison: Frenet Coordinate System
#
# This is the same scenario as cartesian_cut_in.yaml but uses Frenet coordinates.
# The NPC performs a smooth lane change from lane 0 to lane 1 over 4 seconds.

scenario_type: cut_in_left
time_step: 0.1
duration: 8.0

# Use Frenet coordinates for smooth lane changes
coordinate_system: frenet

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0
    position: 60.0
    speed: 14.0
    direction: 1
    acceleration: [-8.0, 3.0]

    # In Frenet mode, lane change is controlled by polynomial
    # The lateral position t(t) follows a smooth quintic polynomial
    lane_change:
      enabled: true
      method: polynomial
      direction: left
      start_time: 2.5     # Start at t=2.5s (matches cut_in_time min)
      duration: 4.0       # Complete by t=6.5s

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
