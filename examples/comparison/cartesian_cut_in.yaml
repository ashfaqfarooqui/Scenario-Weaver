# Comparison: Cartesian Coordinate System
#
# This example uses traditional Cartesian coordinates with discrete lane changes.
# The NPC switches from lane 0 to lane 1 at a random time between 2.5 and 7.5 seconds.

scenario_type: cut_in_left
time_step: 0.1
duration: 8.0

# Explicitly set to Cartesian (also the default)
coordinate_system: cartesian

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0
    position: 60.0
    speed: 14.0
    direction: 1
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
