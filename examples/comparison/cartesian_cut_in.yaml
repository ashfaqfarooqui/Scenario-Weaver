# ─── Scenario: Cartesian Cut-In Comparison ───
#
# Comparison example using the Cartesian coordinate system for a left cut-in scenario.
# Intended for side-by-side comparison with a Bicycle model equivalent.
#
# Actors:
#   - ego: lane 1, 15 m/s forward, fixed position at 50m
#   - npc: lane 0, 14 m/s forward, fixed position at 60m, performs right lane change
#
# Road: 3 lanes, 3.5m wide, all forward
# Coordinate System: cartesian (explicit)
# Duration: 8.0s at 0.1s time steps
#
# Key Features:
#   - Explicit cartesian coordinate system selection (also the default)
#   - NPC cuts right from lane 0 to lane 1 starting at 2.5-4.0s over 3.0-4.0s
#   - Fixed actor positions (no ranges) for reproducible comparison
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/comparison/cartesian_cut_in.yaml -o output/
#

scenario_type: cut_in_left
time_step: 0.1
duration: 8.0

# Explicitly set to Cartesian (also the default)
coordinate_system: cartesian

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 50.0
    speed: 15.0
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0
    position: 60.0
    speed: 14.0
    direction: 1
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
