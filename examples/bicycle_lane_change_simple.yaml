# ─── Scenario: Bicycle Lane Change (Simple) ───
#
# Simplified cut-in-left scenario using the bicycle kinematic model with coarse time steps for fast solving.
#
# Actors:
#   - ego: lane 1, 15 m/s forward, fixed position at 0m
#   - npc: lane 0, 15 m/s forward, fixed position at 50m, cuts right into ego's lane
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: bicycle
# Duration: 10.0s at 0.2s time steps
#
# Key Features:
#   - NPC performs right lane change at 1.5s over 2.0s (fixed values, not ranges)
#   - Uses bicycle kinematic model with wheelbase 2.7m
#   - Coarser 0.2s time step for faster Z3 solving
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 10.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/bicycle_lane_change_simple.yaml -o output/
#
scenario_type: cut_in_left
coordinate_system: bicycle
time_step: 0.2 # Coarser timestep for faster solving
duration: 10.0 # Shorter duration

bicycle_config:
  default_wheelbase: 2.7
  default_max_steering_angle: 0.6
  default_max_steering_rate: 0.5

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 0.0
    speed: 15.0
    acceleration: [-8.0, 3.0]
    direction: 1

  - id: npc
    role: npc
    lane: 0
    position: 50.0
    speed: 15.0
    acceleration: [-8.0, 3.0]
    direction: 1

    lane_changes:
      - direction: right
        start_time: 1.5
        duration: 2.0

min_ttc: 3.0
min_distance: 10.0
num_scenarios: 1
