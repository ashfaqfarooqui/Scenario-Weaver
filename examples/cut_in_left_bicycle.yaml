# ─── Scenario: Cut-In Left (Bicycle) ───
#
# NPC cuts in from the left lane into ego's lane using the bicycle kinematic model on a 3-lane highway.
#
# Actors:
#   - ego: lane 1, 14-16 m/s forward, position 40-60m
#   - npc: lane 0 (left of ego), 16-20 m/s forward, position 50-80m, cuts right into lane 1
#
# Road: 3 lanes, 3.5m wide, all forward
# Coordinate System: bicycle
# Duration: 10.0s at 0.1s time steps
#
# Key Features:
#   - NPC performs right lane change at 2.5-3.5s over 3.0-4.0s
#   - Uses bicycle kinematic model with wheelbase 2.7m, max steering 0.6 rad
#   - Generates 5 diverse scenarios via blocking clauses
#   - Range-based parameters for both actors enable diverse solutions
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/cut_in_left_bicycle.yaml -o output/
#
scenario_type: cut_in_left
coordinate_system: bicycle

time_step: 0.1
duration: 10.0

bicycle_config:
  default_wheelbase: 2.7
  default_max_steering_angle: 0.6
  default_max_steering_rate: 0.5

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: [40.0, 60.0]
    speed: [14.0, 16.0]
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0                    # left of ego
    position: [50.0, 80.0]
    speed: [16.0, 20.0]
    direction: 1
    acceleration: [-8.0, 3.0]

    lane_changes:
      - direction: right        # NPC cuts from lane 0 into lane 1 (ego's lane)
        start_time: [2.5, 3.5]
        duration: [3.0, 4.0]

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 5
