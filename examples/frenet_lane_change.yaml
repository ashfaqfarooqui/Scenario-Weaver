# Example: Frenet Coordinate System with Solver-Discovered Lane Changes
#
# This example demonstrates the Frenet coordinate system where the solver
# discovers smooth lane change trajectories dynamically using smoothness constraints.
#
# Key features:
# - coordinate_system: frenet - Uses Frenet (s, t) coordinates instead of Cartesian (x, y)
# - lane_change with ranges - Solver chooses optimal start_time and duration
# - Smooth trajectories - Lateral acceleration and velocity constrained for realism

scenario_type: cut_in_left
time_step: 0.1
duration: 15.0

# Coordinate system selection
# - frenet: Uses Frenet coordinates (s, t) with solver-discovered lane changes
# - cartesian: Uses Cartesian coordinates (x, y) with discrete lane assignments
coordinate_system: frenet

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]
  road_length: 250.0  # Optional: explicit road length in meters (defaults to duration * 30.0)

actors:
  # Ego vehicle - stays in lane 1
  # Note: Using ranges for position and speed to enable multiple scenario generation
  - id: ego
    role: ego
    lane: 1
    position: [0.0, 55.0]   # Wide range: allows significant variability
    speed: [14.0, 16.0]      # Range: allows variability for multiple scenarios
    direction: 1
    acceleration: [-8.0, 3.0]

  # NPC - performs smooth lane change from lane 0 to lane 1
  - id: npc
    role: npc
    lane: 0
    position: [50.0, 80.0]   # Wide range: NPC ahead of ego, allows variability
    speed: [12.0, 18.0]      # Wide range: allows more variability
    direction: 1
    acceleration: [-8.0, 3.0]

    # Lane change configuration
    # NOTE: Polynomial method removed - solver discovers trajectories
    lane_change:
      enabled: true
      direction: right          # Lane change direction (lane 0 to lane 1)
      start_time: [4.0, 6.0]    # Range: solver chooses when to start (between 4.0s and 6.0s)
      duration: [3.0, 4.0]      # Range: solver chooses how long (between 3.0s and 4.0s)

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 3  # Generate multiple diverse scenarios

# Optimization target (optional)
# - none: Generate any valid scenario
# - maximize_ttc: Find scenario with maximum time to collision
optimization_target: none
