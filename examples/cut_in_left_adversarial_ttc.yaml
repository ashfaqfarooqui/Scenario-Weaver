scenario_type: cut_in_left

time_step: 0.5
duration: 10.0

actors:
  - id: ego
    role: ego
    lane: 1
    position: 50.0
    speed: 15.0
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    acceleration: [-8.0, 3.0]
    behavior:
      cut_in_time: [2.5, 7.5]

min_ttc: 3.0
min_distance: 5.0
lane_width: 3.5

# Find scenarios that violate TTC but maintain distance
constraint_modes:
  min_ttc: violate
  min_distance: enforce

num_scenarios: 5
