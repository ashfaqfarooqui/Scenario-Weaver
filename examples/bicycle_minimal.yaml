# ─── Scenario: Bicycle Minimal ───
#
# Least-restrictive bicycle model scenario designed for fast Z3 solving and smooth trajectories.
#
# Actors:
#   - ego: lane 1, 15 m/s forward (fixed), zero acceleration, position at 0m
#   - npc: lane 0, 15 m/s forward (fixed), zero acceleration, position 40-60m, cuts right
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: bicycle
# Duration: 5.0s at 0.5s time steps
#
# Key Features:
#   - Fixed speeds and zero acceleration linearize NRA terms (v*theta, v*delta)
#   - Safety constraints ignored to remove 100+ LTL assertions
#   - Short duration and coarse time steps minimize constraint count
#   - NPC lane change at 1.5-2.5s over 1.5-2.0s
#   - Should solve in < 5 seconds
#
# Safety Constraints:
#   - min TTC: 1.0s (ignored)
#   - min distance: 1.0m (ignored)
#
# Run:
#   cargo run --release -- -i examples/bicycle_minimal.yaml -o output/
#
scenario_type: cut_in_left
coordinate_system: bicycle
time_step: 0.5
duration: 5.0

bicycle_config:
  default_wheelbase: 2.7          # meters (typical sedan)
  default_max_steering_angle: 0.6 # radians (~34°)
  default_max_steering_rate: 0.5  # rad/s

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 0.0
    speed: 15.0          # Fixed (not a range) → v[t] constant → no NRA multiplication
    acceleration: 0.0         # Fixed zero → constant speed
    direction: 1

  - id: npc
    role: npc
    lane: 0
    position: [40.0, 60.0]   # Range for px is fine (linear constraint)
    speed: 15.0          # Fixed speed
    acceleration: [0.0, 0.0]
    direction: 1
    lane_changes:
      - direction: right        # NPC cuts from lane 0 into lane 1
        start_time: [1.5, 2.5]  # Time range gives Z3 flexibility
        duration: [1.5, 2.0]

# Thresholds present but constraints ignored → skips all LTL/direct safety assertions
min_ttc: 1.0
min_distance: 1.0
constraint_modes:
  min_ttc: ignore
  min_distance: ignore

num_scenarios: 1
