# ─── Scenario: Overtake With Opposite Traffic ───
#
# NPC cuts into ego's lane on a bidirectional road with an oncoming traffic lane.
#
# Actors:
#   - ego: lane 0, 15 m/s forward, fixed position at 50m
#   - npc: lane 1, 12-14 m/s forward, left lane change at 2.5-4.0s over 3-4s
#
# Road: 3 lanes, 3.5m wide, lanes 0-1 forward, lane 2 backward
# Coordinate System: cartesian
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Bidirectional road with one oncoming lane (lane 2, direction -1)
#   - NPC performs left lane change from lane 1 into ego's lane 0
#   - Tests scenario generation with mixed-direction lane configurations
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/overtake_with_opposite.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification: 3 lanes
road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, -1]  # Lane 2 is backward (for visualization)

# Two-actor scenario: ego and npc
actors:
  - id: ego
    role: ego
    lane: 0
    position: 50.0
    speed: 15.0
    direction: 1               # Forward (+x)
    acceleration: [-3.0, 2.0]

  - id: npc
    role: npc
    lane: 1
    position: [60.0, 80.0]
    speed: [12.0, 14.0]
    direction: 1               # Forward (+x)
    acceleration: [-8.0, 3.0]
    lane_changes:
      - direction: left
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

# Safety constraints
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: enforce
  min_distance: enforce
