# ─── Scenario: Cut-in from Left (Fixed Ego) ───
#
# An NPC cuts in from the left lane with the ego vehicle at a fixed starting position and speed.
#
# Actors:
#   - ego: lane 1, fixed 15 m/s forward, fixed position 50m
#   - npc: lane 0 (left), 12-14 m/s forward, position 60-80m
#
# Road: 2 lanes, 3.5m wide, both forward
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Ego uses fixed values (no ranges) for deterministic starting state
#   - NPC performs right lane change at 2.5-4.0s over 3-4s duration
#   - Demonstrates fixed vs range value specification
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/cut_in_left_fixed_ego.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5        # 0.5 second discretization
duration: 10.0        # 10 second scenario

# Road specification
road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]  # Both lanes forward

# Actor specifications (generic actor system)
actors:
  # Ego vehicle with FIXED values (no ranges)
  # This is useful when you want the ego to always start at the same position/speed
  - id: ego
    role: ego
    lane: 1                  # right lane
    position: 50.0           # fixed at 50 meters from start
    speed: 15.0              # fixed at 15 m/s (54 km/h)
    direction: 1
    acceleration: [-8.0, 3.0]  # -8.0 to 3.0 m/s²

  # NPC vehicle (background actor)
  - id: npc
    role: npc
    lane: 0                  # left lane
    position: [60.0, 80.0]   # start 60-80m from start (Z3 chooses)
    speed: [12.0, 14.0]      # slightly slower (Z3 chooses)
    direction: 1
    acceleration: [-8.0, 3.0]  # -8.0 to 3.0 m/s²
    lane_changes:
      - direction: right
        start_time: [2.5, 4.0]
        duration: [3.0, 4.0]

# Safety constraints
min_ttc: 3.0              # minimum 3 second time-to-collision
min_distance: 5.0         # minimum 5 meter distance

# Generation settings
num_scenarios: 5          # generate 5 scenarios
