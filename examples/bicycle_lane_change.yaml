# ─── Scenario: Bicycle Lane Change ───
#
# Highway cut-in-left scenario using the bicycle kinematic model with range-based parameters for diverse generation.
#
# Actors:
#   - ego: lane 1, 15 m/s forward, fixed position at 50m
#   - npc: lane 0, 16-20 m/s forward, position 60-80m, cuts right into ego's lane
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: bicycle
# Duration: 10.0s at 0.1s time steps
#
# Key Features:
#   - NPC performs right lane change at 2.5-3.5s over 3.0-4.0s (ranges for Z3 diversity)
#   - Uses bicycle kinematic model with wheelbase 2.7m, max steering 0.6 rad
#   - Supports per-actor bicycle parameter overrides (commented example included)
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/bicycle_lane_change.yaml -o output/
#
scenario_type: cut_in_left
coordinate_system: bicycle
time_step: 0.1
duration: 10.0

# Bicycle model configuration (scenario-level defaults)
bicycle_config:
  default_wheelbase: 2.7              # meters (typical sedan)
  default_max_steering_angle: 0.6     # radians (~34°, minimum turn radius ~4.5m)
  default_max_steering_rate: 0.5      # rad/s (steering wheel can turn 0.5 rad per second)

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 50.0
    speed: 15.0
    acceleration: [-8.0, 3.0]
    direction: 1

  - id: npc
    role: npc
    lane: 0
    position: [60.0, 80.0]
    speed: [16.0, 20.0]
    acceleration: [-8.0, 3.0]
    direction: 1
    # Optional: Override default bicycle parameters for this actor
    # bicycle_params:
    #   wheelbase: 2.9              # Larger vehicle (e.g., SUV)
    #   max_steering_angle: 0.5     # Less maneuverable
    #   max_steering_rate: 0.4      # Slower steering

    lane_changes:
      - direction: right
        start_time: [2.5, 3.5]
        duration: [3.0, 4.0]

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1
