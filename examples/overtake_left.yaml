# ─── Scenario: Overtake Left ───
#
# NPC vehicle overtakes ego from behind using two sequential lane changes on a three-lane road.
#
# Actors:
#   - ego: lane 1 (middle), 14-16 m/s forward, fixed position at 50m
#   - npc: lane 1 (same as ego), 18-22 m/s forward, starts 15-25m behind ego
#
# Road: 3 lanes, 3.5m wide, all forward
# Coordinate System: cartesian
# Duration: 12.0s at 0.5s time steps
#
# Key Features:
#   - NPC performs left lane change at 2-3s (into passing lane 0)
#   - NPC accelerates past ego while in passing lane
#   - NPC performs right lane change at 7-8s (returns to lane 1, now ahead)
#   - Two sequential lane changes model a complete overtake maneuver
#
# Safety Constraints:
#   - min TTC: 2.0s (enforced)
#   - min distance: 4.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/overtake_left.yaml -o output/
#
scenario_type: overtake_left

# Time configuration
time_step: 0.5      # 0.5 second discretization
duration: 12.0      # 12 second scenario (longer to allow complete overtake)

# Road specification
road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]  # All lanes go forward

# Actor specifications
actors:
  # Ego vehicle - cruising at constant speed
  - id: ego
    role: ego
    lane: 1            # Middle lane
    position: 50.0     # Fixed starting position
    speed: [14.0, 16.0]  # 14-16 m/s (~50-58 km/h)
    direction: 1
    acceleration: [-2.0, 1.0]  # Mild acceleration range

  # NPC vehicle - starts behind, overtakes using two lane changes
  - id: npc
    role: npc
    lane: 1            # Same lane as ego (starts behind)
    position: [25.0, 35.0]  # 15-25m behind ego
    speed: [18.0, 22.0]     # Faster than ego (to catch up)
    direction: 1
    acceleration: [-3.0, 4.0]  # Can accelerate to pass

    # Two sequential lane changes for overtake maneuver
    lane_changes:
      # First: move left into passing lane
      - direction: left
        start_time: [2.0, 3.0]    # Enter passing lane between 2-3s
        duration: [1.5, 2.0]      # Lane change takes 1.5-2 seconds
      # Second: move right back to original lane
      - direction: right
        start_time: [7.0, 8.0]    # Return to original lane between 7-8s
        duration: [1.5, 2.0]      # Lane change takes 1.5-2 seconds

# Safety constraints
min_ttc: 2.0        # 2 second minimum time-to-collision
min_distance: 4.0   # 4 meter minimum distance

# Generation settings
num_scenarios: 1
