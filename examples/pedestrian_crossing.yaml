scenario_type: pedestrian_crossing

time_step: 0.5
duration: 10.0

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 0
    position: [0.0, 30.0]
    speed: [8.0, 12.0]
    acceleration: [-3.0, 2.0]

  - id: pedestrian
    role: pedestrian
    lane: 0  # 0 = cross from left to right
    position: [40.0, 60.0]
    speed: [0.8, 1.5]
    acceleration: [-1.0, 1.0]

min_ttc: 1.5
min_distance: 1.5
num_scenarios: 1
