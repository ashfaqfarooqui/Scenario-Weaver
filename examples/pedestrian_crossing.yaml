scenario_type: pedestrian_crossing

time_step: 0.5
duration: 10.0

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 0
    position: 0.0
    speed: [8.0, 12.0]
    acceleration: [-3.0, 2.0]

  - id: pedestrian
    role: pedestrian
    lane: 0  # Ignored for pedestrians (fixed to 0 internally)
    position: [40.0, 60.0]  # Range allows Z3 to find safe crossing point
    speed: [0.8, 1.5]  # Normal walking speed range
    acceleration: [-1.0, 1.0]
    behavior:
      walking_mode: walk  # Options: "walk" (max 2.0 m/s), "run" (max 5.0 m/s), "hesitate" (pauses during crossing)
      direction: left_to_right  # Crossing direction: "left_to_right" or "right_to_left"

# NOTE: Using 'ignore' mode due to performance issues with 'enforce' mode
# TODO: Investigate why enforce mode times out (likely related to 2D safety constraints)
constraint_modes:
  min_ttc: ignore
  min_distance: ignore

# Reasonable safety thresholds for pedestrian crossing
min_ttc: 2.0  # 2 seconds time-to-collision (standard for pedestrian safety)
min_distance: 2.0  # 2 meters minimum distance
num_scenarios: 1
