# ─── Scenario: Pedestrian Crossing ───
#
# A pedestrian crosses a two-lane road while an ego vehicle approaches.
#
# Actors:
#   - ego: lane 0, 8-12 m/s forward, approaching the crossing point
#   - pedestrian: walking left-to-right at 0.8-1.5 m/s, position range 10-60m
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: cartesian
# Duration: 10.0s at 0.3s time steps
#
# Key Features:
#   - Pedestrian actor with walking behavior (max 2.0 m/s)
#   - Left-to-right crossing direction
#   - Z3 solver finds safe crossing point within position range
#   - Finer time step (0.3s) for pedestrian interaction precision
#
# Safety Constraints:
#   - min TTC: 2.0s (ignored)
#   - min distance: 2.0m (ignored)
#
# Run:
#   cargo run --release -- -i examples/pedestrian_crossing.yaml -o output/
#
scenario_type: pedestrian_crossing

time_step: 0.3
duration: 10.0

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 0
    position: [0.0, 40.0]
    speed: [8.0, 12.0]
    direction: 1
    acceleration: [-5.0, 2.0]

  - id: pedestrian
    role: pedestrian
    lane: 0  # Ignored for pedestrians (fixed to 0 internally)
    position: [10.0, 60.0]  # Range allows Z3 to find safe crossing point
    speed: [0.8, 1.5]  # Normal walking speed range
    direction: 1
    acceleration: [-1.0, 1.0]
    behavior:
      walking_mode: walk  # Options: "walk" (max 2.0 m/s), "run" (max 5.0 m/s), "hesitate" (pauses during crossing)
      direction: left_to_right  # Crossing direction: "left_to_right" or "right_to_left"

# NOTE: Updated to 'enforce' mode after optimizing time_step to 0.2s (reduced from 0.1s)
# This provides guiding constraints for Z3 while maintaining reasonable performance
constraint_modes:
  min_ttc: ignore
  min_distance: ignore

# Reasonable safety thresholds for pedestrian crossing
min_ttc: 2.0  # 2 seconds time-to-collision (standard for pedestrian safety)
min_distance: 2.0  # 2 meters minimum distance
num_scenarios: 1
