# ─── Scenario: Smooth Lane Change (Cartesian) ───
#
# Demonstrates the Cartesian coordinate system with smooth, gradual lateral lane transitions.
#
# Actors:
#   - ego: lane 1, 14-16 m/s forward, position 0-55m
#   - npc: lane 0, 16-20 m/s forward, position 20-80m, right lane change at 2.5-3.5s over 3-4s
#
# Road: 3 lanes, 3.5m wide, all forward [1, 1, 1]
# Coordinate System: cartesian (explicit)
# Duration: 10.0s at 0.1s time steps (fine-grained)
#
# Key Features:
#   - Explicit cartesian coordinate system selection
#   - Smooth lateral interpolation between lane centers during lane change
#   - Fine 0.1s time step for detailed trajectory resolution
#   - Lateral velocity ~1.17 m/s, lateral acceleration bounded to 2.0 m/s²
#   - Generates 3 diverse scenarios
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced by default)
#   - min distance: 5.0m (enforced by default)
#
# Run:
#   cargo run --release -- -i examples/smooth_lane_change_cartesian.yaml -o output/
#
scenario_type: cut_in_left
time_step: 0.1
duration: 10.0

# Coordinate system selection
# - frenet: Uses Frenet coordinates (s, t) with solver-discovered lane changes
# - cartesian: Uses Cartesian coordinates (x, y) with smooth lane transitions
coordinate_system: cartesian

road:
  num_lanes: 3
  lane_width: 3.5
  lane_directions: [1, 1, 1]

actors:
  - id: ego
    role: ego
    lane: 1  # Right lane
    position: [0.0, 55.0]
    speed: [14.0, 16.0]
    direction: 1
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 0  # Left lane
    position: [20.0, 80.0]
    speed: [16.0, 20.0]
    direction: 1
    acceleration: [-8.0, 3.0]

    # Explicit lane_changes configuration
    # This enables smooth lane transitions in Cartesian mode
    lane_changes:
      - direction: right         # NPC cuts from left (lane 0) to right (lane 1)
        start_time: [2.5, 3.5]  # Lane change starts between 2.5-3.5 seconds
        duration: [3.0, 4.0]    # Lane change takes 3-4 seconds (smooth transition)

min_ttc: 3.0
min_distance: 5.0
num_scenarios: 3

# Notes:
# - Lateral velocity will be ~1.17 m/s for 3.5m lane change over 3s (realistic)
# - Lateral acceleration constrained to 2.0 m/s² during lane change
# - Before and after lane change, vehicle stays at lane center
# - lane_changes supports multiple sequential lane changes (e.g., for overtake)
