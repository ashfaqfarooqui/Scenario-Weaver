# ─── Scenario: Head-On Collision ───
#
# Adversarial head-on scenario where an oncoming NPC changes into the ego's lane with safety constraints violated.
#
# Actors:
#   - ego: lane 0, 20 m/s forward, starting at 50m
#   - npc: lane 2 (oncoming), 20 m/s backward, starting at 150m, left lane change at 2.5-4.0s
#
# Road: 4 lanes, 3.5m wide, bidirectional [1, 1, -1, -1]
# Coordinate System: cartesian (default)
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Oncoming NPC in backward lane changes toward ego's forward lanes
#   - Closing speed of ~40 m/s (both vehicles approaching each other)
#   - Adversarial: safety constraints intentionally violated to force collision
#
# Safety Constraints:
#   - min TTC: 3.0s (violated)
#   - min distance: 5.0m (violated)
#
# Run:
#   cargo run --release -- -i examples/head_on_collision.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 10.0

# Road specification with bidirectional traffic
road:
  num_lanes: 4
  lane_width: 3.5
  lane_directions: [1, 1, -1, -1]  # Lanes 0,1 forward; 2,3 backward

# Actors
actors:
  - id: ego
    role: ego
    lane: 0                     # Forward lane (rightmost)
    position: 50.0              # Starting at x=50m
    speed: 20.0                 # 20 m/s forward
    direction: 1               # Forward (+x)
    acceleration: [-8.0, 3.0]

  - id: npc
    role: npc
    lane: 2                     # Backward lane (comes toward ego)
    position: 150.0             # Starts at x=150m (ahead of ego)
    speed: 20.0                 # 20 m/s backward (toward ego)
    direction: -1              # Backward (-x) - oncoming traffic!
    acceleration: [-2.0, 0.0]
    lane_changes:
      - direction: left
        start_time: [2.5, 4.0]
        duration: [2.0, 3.0]

# Safety constraints - VIOLATE to force collision
min_ttc: 3.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: violate
  min_distance: violate

# Expected: Head-on collision around t=2-3s
