# ─── Scenario: Head-On Collision ───
#
# Adversarial head-on scenario: oncoming NPC crosses into ego's lane on a 2-lane
# bidirectional road, violating TTC and distance constraints.
#
# Actors:
#   - ego: lane 0, 15 m/s forward, starting at 0m
#   - npc: lane 1 (oncoming, backward), 15 m/s, starting at 80m
#         performs one left lane change: lane 1 → lane 0 (enters ego's lane head-on)
#
# Road: 2 lanes, 3.5m wide, bidirectional [1, -1]
# Coordinate System: cartesian (default)
# Duration: 8.0s at 0.5s time steps
#
# Key Features:
#   - Simple 2-lane bidirectional road (one lane each direction)
#   - NPC crosses into ego's lane during early phase
#   - Closing speed of ~30 m/s (both vehicles approaching each other)
#   - Adversarial: safety constraints intentionally violated
#   - Lane change occurs early (t=0.5-1.5s) so actors are still approaching when NPC enters ego's lane
#
# Safety Constraints:
#   - min TTC: 2.0s (violated)
#   - min distance: 5.0m (violated)
#
# Run:
#   cargo run --release -- -i examples/head_on_collision.yaml -o output/
#
scenario_type: cut_in_left

# Time configuration
time_step: 0.5
duration: 8.0

# 2-lane bidirectional road: lane 0 forward, lane 1 backward
road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, -1]

# Actors
actors:
  - id: ego
    role: ego
    lane: 0                     # Forward lane
    position: 0.0               # Starting at x=0m
    speed: 15.0                 # 15 m/s forward
    direction: 1               # Forward (+x)
    acceleration: [-5.0, 2.0]

  - id: npc
    role: npc
    lane: 1                     # Backward lane (oncoming)
    position: 80.0              # Starts at x=80m (ahead of ego in x-coordinate)
    speed: 15.0                 # 15 m/s backward (toward ego)
    direction: -1              # Backward (-x) - oncoming traffic!
    acceleration: [-2.0, 1.0]
    lane_changes:
      # Lane change: lane 1 → lane 0 (crosses into ego's lane)
      - direction: left
        start_time: [0.5, 1.5]
        duration: [2.0, 3.0]

# Safety constraints - VIOLATE to force dangerous approach
min_ttc: 2.0
min_distance: 5.0
num_scenarios: 1

constraint_modes:
  min_ttc: violate
  min_distance: violate

# Expected: NPC enters ego's lane while approaching head-on, violating TTC/distance
