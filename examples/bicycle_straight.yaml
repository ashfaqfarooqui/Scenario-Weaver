# ─── Scenario: Bicycle Straight ───
#
# Simple bicycle model scenario with a short, fixed-timing lane change to test basic bicycle kinematics.
#
# Actors:
#   - ego: lane 1, 15 m/s forward, fixed position at 0m
#   - npc: lane 0, 15 m/s forward, fixed position at 50m, cuts right into ego's lane
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: bicycle
# Duration: 5.0s at 0.5s time steps
#
# Key Features:
#   - NPC performs right lane change at 3.0s over 1.0s (fixed values, minimal change)
#   - Uses bicycle kinematic model with wheelbase 2.7m
#   - Short duration and coarse time steps for quick solving
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 10.0m (enforced)
#
# Run:
#   cargo run --release -- -i examples/bicycle_straight.yaml -o output/
#
scenario_type: cut_in_left
coordinate_system: bicycle
time_step: 0.5
duration: 5.0

# Bicycle model configuration (scenario-level defaults)
bicycle_config:
  default_wheelbase: 2.7              # meters (typical sedan)
  default_max_steering_angle: 0.6     # radians (~34°)
  default_max_steering_rate: 0.5      # rad/s

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

actors:
  - id: ego
    role: ego
    lane: 1
    position: 0.0
    speed: 15.0
    acceleration: [-8.0, 3.0]
    direction: 1

  - id: npc
    role: npc
    lane: 0
    position: 50.0
    speed: 15.0
    acceleration: [-8.0, 3.0]
    direction: 1

    # Required lane change configuration (minimal change)
    lane_changes:
      - direction: right
        start_time: 3.0
        duration: 1.0

min_ttc: 3.0
min_distance: 10.0
num_scenarios: 1
