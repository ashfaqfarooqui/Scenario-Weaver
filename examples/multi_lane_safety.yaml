# ─── Scenario: Multi-Lane Safety ───
#
# Adversarial scenario that tests lateral distance violations during a lane change on a two-lane road.
#
# Actors:
#   - ego: lane 1, 15-20 m/s forward, mild acceleration
#   - npc: lane 0, 15-20 m/s forward, right lane change at 4.0-5.5s over 3-4s
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: cartesian
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - NPC performs right lane change into ego's lane
#   - Lateral distance constraint (1.5m) set to violate mode (adversarial)
#   - TTC and longitudinal distance remain enforced for safety
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#   - min lateral distance: 1.5m (violated - adversarial)
#
# Run:
#   cargo run --release -- -i examples/multi_lane_safety.yaml -o output/
#
scenario_type: cut_in_left
time_step: 0.5
duration: 10.0
num_scenarios: 1

actors:
  - id: ego
    role: ego
    lane: 1
    position: [40.0, 60.0]
    speed: [15.0, 20.0]
    direction: 1
    acceleration: [-4.0, 2.0]

  - id: npc
    role: npc
    lane: 0
    position: [30.0, 50.0]
    speed: [15.0, 20.0]
    direction: 1
    acceleration: [-4.0, 2.0]
    lane_changes:
      - direction: right
        start_time: [4.0, 5.5]
        duration: [3.0, 4.0]

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

min_ttc: 3.0
min_distance: 5.0

# Minimum lateral distance: 1.5 meters (vehicles must maintain this separation)
# During the lane change, vehicles will get closer laterally
min_lateral_distance: 1.5

# Constraint modes: violate lateral distance (adversarial - demonstrate proposition)
constraint_modes:
  min_ttc: enforce
  min_distance: enforce
  min_lateral_distance: violate  # Find scenario where lateral distance is violated
