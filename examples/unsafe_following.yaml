# ─── Scenario: Unsafe Following ───
#
# Adversarial scenario where an NPC cuts in with excessive relative velocity compared to the ego.
#
# Actors:
#   - ego: lane 1, 10-15 m/s forward (slower lead vehicle)
#   - npc: lane 0, 18-25 m/s forward, right lane change at 2.0-4.0s over 3-4s
#
# Road: 2 lanes, 3.5m wide, all forward
# Coordinate System: cartesian
# Duration: 10.0s at 0.5s time steps
#
# Key Features:
#   - Relative velocity constraint (10 m/s max difference) in violate mode
#   - NPC is significantly faster than ego, creating unsafe following after cut-in
#   - TTC and distance constraints remain enforced
#   - Demonstrates RelativeVelocityGT proposition
#
# Safety Constraints:
#   - min TTC: 3.0s (enforced)
#   - min distance: 5.0m (enforced)
#   - max relative velocity: 10.0 m/s (violated - adversarial)
#
# Run:
#   cargo run --release -- -i examples/unsafe_following.yaml -o output/
#
scenario_type: cut_in_left
time_step: 0.5
duration: 10.0
num_scenarios: 1

actors:
  - id: ego
    role: ego
    lane: 1
    position: [30.0, 50.0]
    speed: [10.0, 15.0]  # Slower lead vehicle
    direction: 1
    acceleration: [-3.0, 1.0]

  - id: npc
    role: npc
    lane: 0
    position: [45.0, 65.0]  # Starting ahead
    speed: [18.0, 25.0]  # Much faster - unsafe following when cuts in
    direction: 1
    acceleration: [-4.0, 2.0]
    lane_changes:
      - direction: right
        start_time: [2.0, 4.0]
        duration: [3.0, 4.0]

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

min_ttc: 3.0
min_distance: 5.0

# Maximum relative velocity: 10 m/s difference
# If following vehicle is more than 10 m/s faster than lead, it's unsafe
max_relative_velocity: 10.0

# Constraint modes: violate relative velocity (adversarial - find unsafe scenario)
constraint_modes:
  min_ttc: enforce
  min_distance: enforce
  max_relative_velocity: violate  # Find scenario where relative speed is too high
