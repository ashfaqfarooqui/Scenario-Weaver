# Unsafe following scenario
# Demonstrates relative velocity constraint for detecting unsafe following behavior
# The following vehicle is approaching too fast relative to the lead vehicle

scenario_type: cut_in_left
time_step: 0.5
duration: 10.0
num_scenarios: 1

actors:
  - id: ego
    role: ego
    lane: 1
    position: [30.0, 50.0]
    speed: [10.0, 15.0]  # Slower lead vehicle
    acceleration: [-3.0, 1.0]

  - id: npc
    role: npc
    lane: 0
    position: [45.0, 65.0]  # Starting ahead
    speed: [18.0, 25.0]  # Much faster - unsafe following when cuts in
    acceleration: [-4.0, 2.0]
    behavior:
      cut_in_time: [2.0, 5.0]

road:
  num_lanes: 2
  lane_width: 3.5
  lane_directions: [1, 1]

min_ttc: 3.0
min_distance: 5.0

# Maximum relative velocity: 10 m/s difference
# If following vehicle is more than 10 m/s faster than lead, it's unsafe
max_relative_velocity: 10.0

# Constraint modes: violate relative velocity (adversarial - find unsafe scenario)
constraint_modes:
  min_ttc: enforce
  min_distance: enforce
  max_relative_velocity: violate  # Find scenario where relative speed is too high
